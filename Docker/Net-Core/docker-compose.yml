services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
      - "8080:80/tcp"
      - "8443:443/tcp"
    environment:
      TZ: "America/New_York"
      FTLCONF_webserver_api_password: "$PI_HOLE_ADMIN_PASSWORD"
      FTLCONF_dns_listeningMode: "ALL"
      FTLCONF_dns_upstreams: "unbound#53"
      FTLCONF_dns_specialDomains_iCloudPrivateRelay: "true"
      FTLCONF_ntp_sync_active: "false"
    volumes:
      - "etc-pihole:/etc/pihole"
    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE
    healthcheck:
      test: ["CMD", "dig", "+short", "pi.hole", "@127.0.0.1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - dns_net
    deploy:
      placement:
        constraints:
          - node.hostname == $MANAGER_NODE
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 50
        window: 120s

  unbound:
    image: mvance/unbound:latest
    healthcheck:
      test: ["CMD-SHELL", "drill @127.0.0.1 -p 53 cloudflare.com | grep -q NOERROR"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    ports:
      - "5335:53/tcp"
      - "5335:53/udp"
    volumes:
      - unbound_config:/opt/unbound/etc/unbound/
    networks:
      - dns_net
    deploy:
      placement:
        constraints:
          - node.hostname == $MANAGER_NODE
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 50
        window: 120s

  pihole-exporter:
    image: ekofr/pihole-exporter:v1.2.0
    tty: true
    environment:
      PIHOLE_HOSTNAME: pihole
      PIHOLE_PASSWORD: "$PI_HOLE_ADMIN_PASSWORD"
      PORT: "9617"
    ports:
      - "9617:9617"
    healthcheck:
      disable: true
    networks:
      - dns_net
    deploy:
      placement:
        constraints:
          - node.hostname == $MANAGER_NODE
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 50
        window: 120s

  app:
    image: "jc21/nginx-proxy-manager:latest"
    environment:
      TZ: "America/New_York"
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - npm_data:/data
      - letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:81/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - dns_net
    deploy:
      placement:
        constraints:
          - node.hostname == $MANAGER_NODE
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 50
        window: 120s

volumes:
  etc-pihole:
    driver: local
    driver_opts:
      type: nfs
      o: addr=$NFS_SERVER_IP,nolock,soft,rw
      device: ":$NFS_SHARED_DIR/etc-pihole"
  unbound_config:
    driver: local
    driver_opts:
      type: nfs
      o: addr=$NFS_SERVER_IP,nolock,soft,rw
      device: ":$NFS_SHARED_DIR/etc-unbound"
  npm_data:
    driver: local
    driver_opts:
      type: nfs
      o: addr=$NFS_SERVER_IP,nolock,soft,rw
      device: ":$NFS_SHARED_DIR/nginx-proxy-manager/data"
  letsencrypt:
    driver: local
    driver_opts:
      type: nfs
      o: addr=$NFS_SERVER_IP,nolock,soft,rw
      device: ":$NFS_SHARED_DIR/nginx-proxy-manager/letsencrypt"

networks:
  dns_net:
